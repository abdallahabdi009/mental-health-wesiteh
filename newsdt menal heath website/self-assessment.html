<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        #lightbulb {
            width: 100px;
            height: 130px;
            background-color: gray;
            border-radius: 50% 50% 45% 45%;
            margin-top: 20px;
        }
        #screw {
            width: 60px;
            height: 25px;
            background-color: #888;
            margin-left: 20px;
            border-radius: 0 0 5px 5px;
        }
    </style>
    <script>
        // Hide the form
        function hideForm() {
            document.getElementById("myForm").style.display = "none";
        }

        // Show the form
        function showForm() {
            document.getElementById("myForm").style.display = "block";
        }

        // Turn the light ON
        function turnOn() {
            document.getElementById("lightbulb").style.backgroundColor = "yellow";
        }

        // Turn the light OFF
        function turnOff() {
            document.getElementById("lightbulb").style.backgroundColor = "gray";
        }

        function validateForm() {
            var missing = "";

            if (document.getElementById("name").value == "") {
                missing = missing + "Name\n";
            }

            if (document.getElementById("age").value == "") {
                missing = missing + "Age\n";
            }

            if (document.getElementById("gender").value == "") {
                missing = missing + "Gender\n";
            }

            if (document.getElementById("country").value == "") {
                missing = missing + "Country\n";
            }

            if (document.getElementById("often").checked == false &&
                document.getElementById("sometimes").checked == false &&
                document.getElementById("rarely").checked == false) {
                missing = missing + "Stress level\n";
            }

            if (document.getElementById("exercise").checked == false &&
                document.getElementById("sleep").checked == false &&
                document.getElementById("friends").checked == false &&
                document.getElementById("hobbies").checked == false) {
                missing = missing + "Wellbeing options\n";
            }

            if (document.getElementById("comments").value == "") {
                missing = missing + "Comments\n";
            }

            if (missing != "") {
                alert("You missed the following essential elements:\n" + missing + "Please complete and resubmit");
                return false;
            }

            return true;
        }
    </script>
</head>
<body>

<button onclick="hideForm()">Hide Form</button>
<button onclick="showForm()">Show Form</button>

<form id="myForm" onsubmit="return validateForm()">

    <p>Name:</p>
    <input type="text" id="name">

    <p>Age:</p>
    <input type="number" id="age">

    <p>Gender:</p>
    <select id="gender">
        <option value="">-- Select --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <p>Country:</p>
    <select id="country" size="3">
        <option value="">-- Select --</option>
        <option value="uk">UK</option>
        <option value="us">USA</option>
        <option value="ca">Canada</option>
    </select>

    <p>How often do you feel stressed?</p>

    <input type="radio" name="stress" id="often"> Often<br>
    <input type="radio" name="stress" id="sometimes"> Sometimes<br>
    <input type="radio" name="stress" id="rarely"> Rarely<br>

    <p>What helps your mental wellbeing?</p>

    <input type="checkbox" id="exercise"> Exercise<br>
    <input type="checkbox" id="sleep"> Sleeping well<br>
    <input type="checkbox" id="friends"> Spending time with friends<br>
    <input type="checkbox" id="hobbies"> Hobbies<br>

    <p>Additional comments:</p>

    <textarea id="comments" rows="4" cols="40"></textarea>

    <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Clear">

</form>

<br><br>

<h2>Task 1d: Light Switch Special Effect</h2>
<p>Click the buttons to turn the light on or off.</p>

<button onclick="turnOn()">Turn ON</button>
<button onclick="turnOff()">Turn OFF</button>

<div id="lightbulb"></div>
<div id="screw"></div>

</body>
</html>
