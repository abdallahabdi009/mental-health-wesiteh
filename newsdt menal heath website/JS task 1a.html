<!DOCTYPE html>
<html lang="en">
<head>
  <title>Task 1a - document.write</title>
  <script>
    // Function that writes a message on the page using document.write
    function writeMessage() {
      document.write("Welcome to my JavaScript page!");
    }
  </script>
</head>
<body>

<h1>Task 1a: document.write Example</h1>

<p>Click the button below to display a message using document.write.</p>

<button onclick="writeMessage()">Click me</button>

</body>
</html>
